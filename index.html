<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="outer-card">

    <!-- LEFT PANEL -->
    <div class="visual-panel">
        <div class="quote-label">A Wise Quote</div>

        <div class="visual-text">
            <h1>Get Everything<br>You Want</h1>
            <p>You can get everything you want if you work hard, trust the process, and stick to the plan.</p>
        </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="form-panel">

        <form action="auth.php" method="POST" class="form-content">

            <h2>Welcome Back</h2>
            <p class="subtitle">Enter your email and password to access your account</p>

            <!-- EMAIL -->
            <div class="input-group">
                <label>Email</label>
                <input type="email" name="userId" placeholder="Enter your email" required>
            </div>

            <!-- PASSWORD -->
            <div class="input-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>

                    <button type="button" class="toggle-btn" onclick="togglePassword()">
                        <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- ERROR MESSAGE -->
            <p id="server-error" style="color:red; margin-bottom:10px;"></p>

            <!-- BUTTON -->
            <button type="submit" class="submit-btn">
                <span>Sign In</span>
            </button>

        </form>

        <p class="footer-text">
            Don't have an account? <a href="signup.html">Sign Up</a>
        </p>

    </div>
</div>

<!-- JS -->
 <script src="script.js"></script>
<script>
    function togglePassword() {
        const input = document.getElementById('password');
        const icon = document.getElementById('eye-icon');

        if (input.type === 'password') {
            input.type = 'text';
            icon.innerHTML = `
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
            `;
        } else {
            input.type = 'password';
            icon.innerHTML = `
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
            `;
        }
    }
</script>

</body>
</html>
